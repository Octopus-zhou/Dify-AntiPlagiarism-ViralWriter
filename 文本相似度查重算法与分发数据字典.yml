          \    clean_pattern = re.compile(r'[^\\u4e00-\\u9fa5|a-zA-Z0-9]')\n    str_raw\
          \ = clean_pattern.sub('', raw_viral_content)\n    set_raw = set(str_raw)\n\
          \    \n    # 鲁棒性防御：防止原始输入异常为空\n    if not set_raw or not drafts:\n     \
          \   return {\"best_similarity_score\": 100.0, \"is_safe\": False, \"best_draft\"\
          : \"\", \"msg\": \"输入文本数据异常为空\"}\n        \n    best_score = 100.0  # 初始化一个极高查重值\n\
          \    best_draft = \"\"\n    \n    # 3. 循环迭代，对 3 篇草稿进行并行的 Jaccard 相似度系数矩阵计算\n\
          \    for draft in drafts:\n        # 清洗单篇草稿内容\n        str_draft = clean_pattern.sub('',\
          \ draft)\n        set_draft = set(str_draft)\n        if not set_draft:\n\
          \            continue\n            \n        # 计算交集与并集\n        intersection_len\
          \ = len(set_raw.intersection(set_draft))\n        union_len = len(set_raw.union(set_draft))\n\
          \        \n        # 算出当前草稿的重合百分比\n        current_score = (intersection_len\
          \ / union_len) * 100\n        \n        # 【核心算法策略】：我们需要查重率最低（即原创度最高）的那篇\n\
          \        if current_score < best_score:\n            best_score = current_score\n\
